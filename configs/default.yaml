experiment_name: default

seed: 42

data:
  sample_rate: 16000
  segment_seconds: 10
  feature_type: logmel

model:
  name: crnn
  hidden_size: 256
  dropout: 0.3

training:
  batch_size: 16
  epochs: 50
  lr: 0.0003
  weight_decay: 0.0001

evaluation:
  metrics:
    - frame_f1
    - onset_f1
    - note_f1
